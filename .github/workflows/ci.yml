name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests (incl. leakage guard)
        run: pytest -v

      - name: Run eval pipeline on CI-sized sample
        run: python -m src.eval.run --config configs/ci.yaml --out results/ci_metrics.json

      - name: Upload eval results
        uses: actions/upload-artifact@v4
        with:
          name: ci-metrics
          path: results/ci_metrics.json
